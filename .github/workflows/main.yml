name: Debian12-XRDP

on:
  workflow_dispatch:

jobs:
  debian:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Update System
        run: |
          sudo apt update
          sudo apt upgrade -y

      - name: Install XFCE + XRDP
        run: |
          sudo apt install -y xfce4 xfce4-goodies xrdp dbus-x11

      - name: Configure XRDP
        run: |
          echo "startxfce4" | sudo tee /etc/skel/.xsession

      - name: Create User
        run: |
          sudo useradd -m -s /bin/bash RDP
          echo "RDP:Password123!" | sudo chpasswd
          sudo usermod -aG sudo RDP
          echo "startxfce4" | sudo tee /home/RDP/.xsession
          sudo chown RDP:RDP /home/RDP/.xsession
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y xfce4 xfce4-goodies xrdp dbus-x11
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp
          sudo adduser rdpuser
          sudo usermod -aG sudo rdpuser
          sudo ufw allow 3389/tcp
          sudo ufw enable


hostname -I

      - name: Start XRDP
        run: |
          sudo systemctl enable xrdp
          sudo systemctl restart xrdp
          sudo systemctl status xrdp --no-pager

      - name: Show Login Info
        run: |
          echo "======================"
          echo "Username : RDP"
          echo "Password : Password123!"
          echo "Port     : 3389"
          echo "======================"

      - name: Keep Runner Alive
        run: |
          while true
          do
            echo "Runner Active - $(date)"
            sleep 300
          done
